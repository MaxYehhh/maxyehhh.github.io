<script>
    let lang = 'zh';

    function setLang(l) {
        lang = l;
        document.documentElement.lang = l === 'zh' ? 'zh-TW' : 'en';
        document.getElementById('lang-btn').textContent = l === 'zh' ? 'EN' : '中';
        document.querySelectorAll('[data-zh]').forEach(el => {
            el.textContent = el.dataset[l] || '';
        });
    }

    function toggleLang() {
        setLang(lang === 'zh' ? 'en' : 'zh');
    }

    setLang('zh');
</script>
